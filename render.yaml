services:
  - type: web
    name: cce-api
    runtime: node
    plan: free
    region: frankfurt
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm --filter @cce/api start
    envVars:
      - key: NODE_VERSION
        value: 20.18.0

  - type: web
    name: cce-web
    runtime: static
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @cce/web build
    staticPublishPath: apps/web/dist
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      # Set these to cce-api's actual URL once it's deployed (Render predicts
      # https://cce-api.onrender.com if that name is available at creation
      # time) — see docs/DEPLOY.md. Vite bakes these in at build time, so
      # changing them requires a rebuild ("Manual Deploy" on this service).
      - key: VITE_API_URL
        sync: false
      - key: VITE_WS_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
